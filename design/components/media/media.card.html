<!-- @dsCard group="Components" viewport="700x360" name="Media — PosterCard · Avatar" subtitle="Key-art poster tile + cast avatars" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css"><style>*{box-sizing:border-box}body{margin:0;background:var(--luma-bg);font-family:var(--font-ui);padding:18px;display:flex;gap:22px;align-items:flex-start}
.poster{width:190px}.pin{position:relative;aspect-ratio:2/3;border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-card)}
.scrim{position:absolute;inset:0;background:linear-gradient(170deg,rgba(0,0,0,.05) 35%,rgba(0,0,0,.72))}
.bd{position:absolute;top:10px;right:10px;font:700 10px var(--font-ui);padding:4px 7px;border-radius:5px;background:rgba(10,10,12,.6);color:var(--luma-accent)}
.cap{position:absolute;left:14px;right:14px;bottom:15px}.ov{font:700 10px var(--font-ui);letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:5px}.ti{font:700 20px var(--font-display);color:#fff}
.pr{position:absolute;left:0;right:0;bottom:0;height:5px;background:rgba(255,255,255,.22)}.prf{height:100%;background:var(--luma-accent)}
.av{width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;font:700 40px var(--font-display);color:rgba(255,255,255,.92)}
.col{display:flex;gap:16px;flex-direction:column;align-items:center}.lab{font:600 13px var(--font-ui);color:var(--luma-text)}.role{font:500 12px var(--font-ui);color:var(--luma-text-dim)}</style></head><body>
<div class="poster"><div class="pin" style="background:linear-gradient(158deg,#3A2E5C 0%,#0E1430 70%)"><div class="scrim"></div><div class="bd">4K</div><div class="cap"><div class="ov">Thriller SF</div><div class="ti">Sillage</div></div><div class="pr"><div class="prf" style="width:38%"></div></div></div></div>
<div class="poster"><div class="pin" style="background:linear-gradient(158deg,#1A3A5C 0%,#08182A 70%)"><div class="scrim"></div><div class="bd">HDR</div><div class="cap"><div class="ov">Science-fiction</div><div class="ti">Orbite Basse</div></div></div></div>
<div style="display:flex;gap:26px;padding-top:8px">
<div class="col"><div class="av" style="background:linear-gradient(135deg,#F4B642,#E8743B)">AR</div><div><div class="lab" style="text-align:center">Adèle Roche</div><div class="role" style="text-align:center">Interprète</div></div></div>
<div class="col"><div class="av" style="background:linear-gradient(135deg,#3BC9DB,#3B82F6)">MD</div><div><div class="lab" style="text-align:center">Marin Daoud</div><div class="role" style="text-align:center">Interprète</div></div></div>
</div>
</body></html>
