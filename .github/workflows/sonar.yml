name: Sonar

# CI-based SonarCloud analysis (config in sonar-project.properties at the repo
# root). Uploads JS/TS coverage (vitest -> lcov) and, best-effort, Rust coverage
# (cargo-llvm-cov -> lcov).
#
# ACTIVATION: the scan job self-skips (clean, not failed) until a `SONAR_TOKEN`
# repository secret exists. You must ALSO turn OFF "Automatic Analysis" in
# SonarCloud (Administration > Analysis Method) - SonarCloud rejects a CI scan
# while Automatic Analysis owns the branch.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: '1.3.14'

jobs:
  # Gate: only run the (costly) scan once SONAR_TOKEN is configured. Secrets can't
  # be read in a job-level `if`, so a tiny job exposes it as an output instead.
  gate:
    name: Check SONAR_TOKEN
    permissions: {}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      run: ${{ steps.g.outputs.run }}
    steps:
      - id: g
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SONAR_TOKEN secret not set - skipping SonarCloud scan."
          fi

  sonar:
    name: SonarCloud scan
    needs: gate
    if: needs.gate.outputs.run == 'true'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history: Sonar needs it for blame / accurate new-code detection.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: JS/TS coverage (vitest -> coverage/lcov.info)
        # Tests are hard-gated in ci.yml; here we only need the lcov (vitest
        # writes it even if a test fails), so a failure must not abort the scan.
        continue-on-error: true
        run: bun run test:coverage

      # --- Rust coverage (best-effort; never blocks the scan) -----------------
      # main pushes always measure Rust; PRs only when they actually touch Rust
      # (the instrumented workspace build is ~10 min, the bulk of this job).
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: rustchanges
        if: github.event_name == 'pull_request'
        with:
          filters: |
            rust:
              - 'server/**'
              # kroma-engine include_str!s these catalogs at compile time.
              - 'packages/core/src/locales/**'

      # Single gate the Rust steps below share: always on main, on PRs only when
      # Rust actually changed.
      - id: rustgate
        env:
          RUN: ${{ github.event_name != 'pull_request' || steps.rustchanges.outputs.rust == 'true' }}
        run: echo "run=$RUN" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        if: steps.rustgate.outputs.run == 'true'
        with:
          components: llvm-tools-preview

      # Its own stable entry: llvm-cov builds with -C instrument-coverage, so
      # these artifacts can't be shared with ci.yml's plain test build. Saved
      # from main only (see ci.yml for the quota rationale) - without this the
      # instrumented tree was re-uploaded per PR AND evicted before reuse, so
      # every scan paid a ~10 min cold build.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        if: steps.rustgate.outputs.run == 'true'
        with:
          workspaces: server
          shared-key: server-coverage
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        if: steps.rustgate.outputs.run == 'true'
        with:
          tool: cargo-llvm-cov

      - name: Rust coverage (cargo-llvm-cov -> server/lcov.info)
        # Skipped on PRs that touch no Rust: Sonar's gate scores NEW code, and a
        # frontend-only PR adds no Rust lines to cover. main always runs it, so
        # the branch-level Rust coverage figure never drifts.
        if: steps.rustgate.outputs.run == 'true'
        working-directory: server
        continue-on-error: true
        # Capped so a cold instrumented build of the big server workspace
        # (candle/librqbit/whisper) can never blow the job budget; the scan then
        # proceeds with JS/TS coverage only.
        timeout-minutes: 25
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      # --- Analysis -----------------------------------------------------------
      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703 # v5.3.2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
