name: Sonar

# CI-based SonarCloud analysis (config in sonar-project.properties at the repo
# root). Uploads JS/TS coverage (vitest -> lcov) and, best-effort, Rust coverage
# (cargo-llvm-cov -> lcov).
#
# ACTIVATION: this job only reports once a `SONAR_TOKEN` repository secret exists
# AND "Automatic Analysis" is turned OFF in SonarCloud (Administration > Analysis
# Method) - SonarCloud rejects a CI scan while Automatic Analysis owns the branch.
# Until then it fails fast on the missing token, which is harmless.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: '1.3.14'

jobs:
  sonar:
    name: SonarCloud scan
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history: Sonar needs it for blame / accurate new-code detection.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: JS/TS coverage (vitest -> coverage/lcov.info)
        run: bun run test:coverage

      # --- Rust coverage (best-effort; never blocks the scan) -----------------
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: server

      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-llvm-cov

      - name: Rust coverage (cargo-llvm-cov -> server/lcov.info)
        working-directory: server
        continue-on-error: true
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      # --- Analysis -----------------------------------------------------------
      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703 # v5.3.2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
