<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css"><style>*{box-sizing:border-box}body{margin:0;background:var(--luma-bg);font-family:var(--font-ui);padding:18px;display:flex;flex-direction:column;gap:14px}.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;gap:9px;border-radius:var(--radius-md);cursor:pointer}.pill{font:700 11px var(--font-ui);padding:4px 9px;border-radius:6px}.chip{font:600 13px var(--font-ui);color:var(--luma-text);background:rgba(255,255,255,.07);border:1px solid var(--luma-border);padding:6px 14px;border-radius:var(--radius-pill)}</style></head><body>
<div class="row">
<button class="btn" style="background:var(--luma-accent);color:var(--luma-accent-ink);border:none;font:700 16px var(--font-ui);padding:14px 28px">▶ Lecture</button>
<button class="btn" style="background:rgba(255,255,255,.1);color:var(--luma-text);border:1px solid var(--luma-border-strong);font:600 16px var(--font-ui);padding:14px 28px">Plus d'infos</button>
<button class="btn" style="background:transparent;color:var(--luma-text);border:none;font:600 13px var(--font-ui);padding:9px 16px">Ghost</button>
</div>
<div class="row">
<span class="pill" style="color:var(--luma-accent);background:var(--luma-accent-soft)">4K</span>
<span class="pill" style="color:var(--luma-hdr);background:rgba(199,146,234,.16)">HDR</span>
<span class="pill" style="color:var(--luma-h265);background:rgba(95,211,196,.16)">H.265</span>
<span class="pill" style="color:var(--luma-success);background:rgba(70,208,141,.16)">Disponible</span>
<span class="chip" style="color:var(--luma-accent-ink);background:var(--luma-accent);border-color:transparent">Saison 1</span>
<span class="chip">FR</span><span class="chip">EN</span><span class="chip">Atmos</span>
</div>
</body></html>
