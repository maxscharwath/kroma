name: Security scan

# Static analysis (CodeQL) for the JS/TS surface + a RustSec advisory audit of the
# Cargo dependency graph. Runs on pushes/PRs to main and weekly (catches new CVEs
# on unchanged code).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Monday 06:00 UTC

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL (JS/TS)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write # upload the SARIF results to code-scanning
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0

  cargo-audit:
    name: cargo audit (RustSec advisories)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      # A prebuilt binary instead of `cargo install cargo-audit --locked` (which
      # compiled the tool from source) - and NO rust-cache: the audit only reads
      # Cargo.lock, so the 142 MB target-dir cache it kept per key was pure
      # pressure on the repo's 10 GB cache quota.
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-audit
      # Informational (non-gating) for now: today's findings are all unmaintained /
      # unsound / yanked TRANSITIVE deps with no available fix (paste, ttf-parser,
      # lru, spin, instant, ...). Surfaced as a warning annotation + full log so
      # new/fixable advisories are visible; tighten to a hard gate with a triaged
      # ignore-list once the transitive noise is addressed upstream.
      - name: Audit the dependency graph (RustSec)
        working-directory: server
        run: cargo audit || echo "::warning title=cargo audit::advisories found (transitive; see the step log)"
